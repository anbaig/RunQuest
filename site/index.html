    pinError: false,
    syncInput: '',
    syncMessage: null,
  };

  function loadState() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        var saved = JSON.parse(raw);
        Object.assign(state, saved);
      }
    } catch (e) {}
  }

  function persist() {
    var toSave = {
      balance: state.balance, totalEarned: state.totalEarned, streak: state.streak, totalMiles: state.totalMiles,
      log: state.log, shop: state.shop, redemptions: state.redemptions,
    };
    try { localStorage.setItem(STORE_KEY, JSON.stringify(toSave)); } catch (e) {}
  }

  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ---- Derived helpers (ported from the design's Component class) ----

  function buildAvatarCells(level, pointsColor, streakColor) {
    var tier = level >= 10 ? 4 : level >= 6 ? 3 : level >= 3 ? 2 : 1;
    var base = [
      'HHHHHHHH',
      'HHHHHHHH',
      'HSESSESH',
      'HSSSSSSH',
      '..SSSS..',
      'BBBBBBBB',
      'BBBBBBBB',
      'BBBBBBBB',
      'B.BBBB.B',
      '..LLLL..',
      '.LL..LL.',
      '.LL..LL.',
    ];
    var rows = base.map(function (r) { return '.' + r + '.'; });
    if (tier >= 2) rows[1] = '.' + 'AAAAAAAA' + '.';
    if (tier >= 3) {
      [6, 7, 8, 9].forEach(function (i) {
        var r = rows[i].split('');
        r[0] = 'A'; r[9] = 'A';
        rows[i] = r.join('');
      });
    }
    if (tier >= 4) {
      rows[0] = '.' + 'C.C.C.C.' + '.';
      rows[1] = '.' + 'CCCCCCCC' + '.';
    }
    var legend = { '.': 'transparent', H: '#5a4d8a', S: '#f0b988', E: '#151225', B: pointsColor, L: '#413875', A: streakColor, C: '#ffe066' };
    var cells = [];
    rows.forEach(function (row, ri) {
      row.split('').forEach(function (ch, ci) {
        cells.push({ key: ri + '-' + ci, color: legend[ch] || 'transparent' });
      });
    });
    return { cells: cells, tier: tier };
  }

  function encodeState(s) {
    var payload = {
      balance: s.balance, totalEarned: s.totalEarned, streak: s.streak, totalMiles: s.totalMiles,
      log: s.log, shop: s.shop, redemptions: s.redemptions,
    };
    return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  }

  function decodeState(code) {
    return JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
  }

  function multFor(streak) {
    if (streak >= 7) return 4;
    if (streak >= 4) return 3;
    if (streak >= 2) return 2;
    return 1;
  }

  var flashTimer = null;
  function flashMessage(text, color) {
    state.syncMessage = { text: text, color: color };
    scheduleRender();
    if (flashTimer) clearTimeout(flashTimer);
    flashTimer = setTimeout(function () {
      state.syncMessage = null;
      scheduleRender();
    }, 3000);
  }

  // ---- Actions (ported 1:1 from the design's event handlers) ----

  var App = {};

  App.openSync = function () {
    state.screen = 'sync'; state.syncInput = ''; state.syncMessage = null;
    scheduleRender();
  };

  App.copySyncCode = function () {
    var code = encodeState(state);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(function () {
        flashMessage('Code copied!', '#4ade80');
      }).catch(function () {
        flashMessage('Copy failed — select & copy manually', '#ff4d6d');
      });
    } else {
      flashMessage('Select the code above to copy manually', '#ffcd3c');
    }
  };

  App.setSyncInput = function (el) {
    state.syncInput = el.value;
  };

  App.loadSyncUpdate = function () {
    try {
      var parsed = decodeState(state.syncInput);
      if (typeof parsed.balance !== 'number' || !Array.isArray(parsed.shop)) throw new Error('bad shape');
      Object.assign(state, parsed);
      state.syncInput = '';
      persist();
      scheduleRender();
      flashMessage('Synced!', '#4ade80');
    } catch (e) {
      flashMessage('Invalid code — check and try again', '#ff4d6d');
    }
  };

  App.tabSync = function () { state.gmTab = 'sync'; scheduleRender(); };

  App.handleGearTap = function () {
    if (CONFIG.gmPinEnabled === false || state.gmUnlocked) {
      state.screen = 'gm'; state.gmTab = 'log';
    } else {
      state.screen = 'pin'; state.pinInput = ''; state.pinError = false;
    }
    scheduleRender();
  };

  App.goDashboard = function () { state.screen = 'dashboard'; scheduleRender(); };
  App.openLogRun = function () { state.showLogRun = true; state.milesInput = ''; scheduleRender(); };
  App.closeLogRun = function () { state.showLogRun = false; state.milesInput = ''; scheduleRender(); };
  App.submitLogRun = function () { App.awardRun(); state.showLogRun = false; scheduleRender(); };
  App.goShop = function () { state.screen = 'shop'; state.purchaseItemId = null; scheduleRender(); };
  App.tabLog = function () { state.gmTab = 'log'; scheduleRender(); };
  App.tabShop = function () { state.gmTab = 'shop'; scheduleRender(); };
  App.tabReq = function () { state.gmTab = 'req'; scheduleRender(); };

  var pinErrorTimer = null;
  App.pressDigit = function (d) {
    var pin = String(CONFIG.gmPin || '1234');
    var next = (state.pinInput + d).slice(0, pin.length);
    if (next.length === pin.length) {
      if (next === pin) {
        state.gmUnlocked = true; state.screen = 'gm'; state.gmTab = 'log'; state.pinInput = ''; state.pinError = false;
      } else {
        state.pinInput = ''; state.pinError = true;
        if (pinErrorTimer) clearTimeout(pinErrorTimer);
        pinErrorTimer = setTimeout(function () { state.pinError = false; scheduleRender(); }, 900);
      }
    } else {
      state.pinInput = next; state.pinError = false;
    }
    scheduleRender();
  };
  App.pressBackspace = function () { state.pinInput = state.pinInput.slice(0, -1); state.pinError = false; scheduleRender(); };

  App.setMiles = function (el) { state.milesInput = el.value; scheduleRender(); };
  App.setNewName = function (el) { state.newItemName = el.value; scheduleRender(); };
  App.setNewCost = function (el) { state.newItemCost = el.value; scheduleRender(); };

  App.awardRun = function () {
    var miles = parseFloat(state.milesInput);
    if (!miles || miles <= 0) return;
    var mult = multFor(state.streak);
    var points = Math.round(miles * mult);
    var entry = { id: Date.now(), date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), miles: miles, points: points, mult: mult };
    state.balance += points;
    state.totalEarned += points;
    state.totalMiles = Math.round((state.totalMiles + miles) * 10) / 10;
    state.streak += 1;
    state.log = [entry].concat(state.log);
    state.milesInput = '';
    persist();
    scheduleRender();
  };

  App.resetStreak = function () { state.streak = 0; persist(); scheduleRender(); };

  App.openPurchase = function (id) { state.purchaseItemId = id; scheduleRender(); };
  App.closePurchase = function () { state.purchaseItemId = null; scheduleRender(); };

  App.confirmPurchase = function () {
    var item = state.shop.find(function (i) { return i.id === state.purchaseItemId; });
    if (!item || state.balance < item.cost) return;
    var redemption = { id: Date.now(), itemId: item.id, itemName: item.name, cost: item.cost, date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), status: 'pending' };
    state.balance -= item.cost;
    state.redemptions = [redemption].concat(state.redemptions);
    state.purchaseItemId = null;
    state.toast = 'Redeemed ' + item.name + '! Ask your GM.';
    persist();
    scheduleRender();
    setTimeout(function () { state.toast = null; scheduleRender(); }, 2600);
  };

  App.setNewColor = function (c) { state.newItemColor = c; scheduleRender(); };

  App.addItem = function () {
    var name = state.newItemName.trim();
    var cost = parseInt(state.newItemCost, 10);
    if (!name || !cost || cost <= 0) return;
    var item = { id: Date.now(), name: name, cost: cost, color: state.newItemColor };
    state.shop = state.shop.concat([item]);
    state.newItemName = ''; state.newItemCost = '';
    persist();
    scheduleRender();
  };

  App.removeItem = function (id) {
    state.shop = state.shop.filter(function (i) { return i.id !== id; });
    persist();
    scheduleRender();
  };

  App.fulfillRedemption = function (id) {
    state.redemptions = state.redemptions.map(function (r) { return r.id === id ? Object.assign({}, r, { status: 'fulfilled' }) : r; });
    persist();
    scheduleRender();
  };

  function tabStyle(active) {
    return 'flex:1; background:' + (active ? '#b185f7' : '#1c1a35') + '; color:' + (active ? '#0d0b1e' : '#9c96c2') + '; border:2px solid ' + (active ? '#b185f7' : '#3a3660') + '; font-size:9px; padding:10px 2px; cursor:pointer; white-space:nowrap;';
  }

  function computeDerived() {
    var s = state;
    var pointsColor = CONFIG.pointsColor;
    var streakColor = CONFIG.streakColor;
    var appName = CONFIG.appName;
    var multiplier = multFor(s.streak);
    var level = Math.floor(s.totalEarned / 100) + 1;
    var progressPct = s.totalEarned % 100;
    var xpLabel = (100 - progressPct) + ' pts to LV ' + (level + 1);
    var avatar = buildAvatarCells(level, pointsColor, streakColor);
    var tierNames = { 1: 'ROOKIE', 2: 'RUNNER', 3: 'CHAMPION', 4: 'LEGEND' };
    var tierName = tierNames[avatar.tier];

    var shopItems = s.shop.map(function (item) {
      var disabled = s.balance < item.cost;
      return Object.assign({}, item, {
        colorHex: COLOR_HEX[item.color] || COLOR_HEX.gold,
        letter: item.name.trim().charAt(0).toUpperCase(),
        disabled: disabled,
        buttonLabel: disabled ? ('NEED ' + (item.cost - s.balance) + ' MORE') : 'BUY',
        buttonStyle: disabled
          ? 'width:100%; background:#0d0b1e; color:#6f699c; border:2px solid #3a3660; font-size:11px; padding:10px 0; cursor:not-allowed;'
          : "width:100%; background:" + pointsColor + "; color:#0d0b1e; border:2px solid #fff; box-shadow:3px 3px 0 #000; font-family:'Press Start 2P'; font-size:11px; padding:10px 0; cursor:pointer;",
      });
    });

    var purchaseItemRaw = s.purchaseItemId ? s.shop.find(function (i) { return i.id === s.purchaseItemId; }) : null;

    var pendingRedemptions = s.redemptions.filter(function (r) { return r.status === 'pending'; });
    var fulfilledRedemptions = s.redemptions.filter(function (r) { return r.status === 'fulfilled'; });

    var colorNames = ['gold', 'red', 'cyan', 'green', 'purple'];
    var colorOptions = colorNames.map(function (c) {
      return { name: c, style: 'width:32px; height:32px; background:' + COLOR_HEX[c] + '; border:' + (s.newItemColor === c ? '3px solid #fff' : '2px solid transparent') + '; cursor:pointer; padding:0;' };
    });

    var padDef = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '', '0', 'DEL'];

    var pinLen = String(CONFIG.gmPin || '1234').length;
    var pinDots = [];
    for (var i = 0; i < pinLen; i++) pinDots.push({ filled: i < s.pinInput.length ? '#b185f7' : 'transparent' });

    var previewPoints = Math.round((parseFloat(s.milesInput) || 0) * multiplier);
    var awardDisabled = !s.milesInput || parseFloat(s.milesInput) <= 0;
    var addDisabled = !s.newItemName.trim() || !s.newItemCost || parseInt(s.newItemCost, 10) <= 0;

    return {
      pointsColor: pointsColor, streakColor: streakColor, appName: appName,
      multiplier: multiplier, level: level, progressPct: progressPct, xpLabel: xpLabel,
      avatarCells: avatar.cells, tierName: tierName,
      shopItems: shopItems, purchaseItem: purchaseItemRaw,
      pendingRedemptions: pendingRedemptions, fulfilledRedemptions: fulfilledRedemptions,
      colorOptions: colorOptions, padDef: padDef, pinDots: pinDots,
      previewPoints: previewPoints, awardDisabled: awardDisabled, addDisabled: addDisabled,
      pinErrorMargin: s.pinError ? '10px' : '30px',
    };
  }

      '<div data-screen-label="Shop">' +
        '<div style="display:flex; align-items:center; justify-content:space-between; padding:22px 20px 16px;">' +
          '<button onclick="App.goDashboard()" style="background:none; border:none; color:#9c96c2; font-family:\'Silkscreen\'; font-size:14px; cursor:pointer; padding:0;">&larr; BACK</button>' +
          '<div style="background:#1c1a35; border:2px solid ' + v.pointsColor + '; padding:6px 12px; font-family:\'Press Start 2P\'; font-size:12px; color:' + v.pointsColor + ';">' + s.balance + ' PTS</div>' +
        '</div>' +
        '<div style="font-family:\'Press Start 2P\'; font-size:17px; color:#f4f1ff; padding:0 20px 18px;">SHOP</div>' +
        '<div style="padding:0 20px; display:grid; grid-template-columns:1fr 1fr; gap:14px;">' + itemsHtml + '</div>' +
        noItemsHtml +
        purchaseModal +
        toastHtml +
      '</div>';
  }

  function renderSyncBody(v, isGm) {
    var s = state;
    var accent = isGm ? '#b185f7' : v.pointsColor;
    var loadAccent = isGm ? '#b185f7' : v.streakColor;
    var msgHtml = s.syncMessage
      ? '<div style="margin-top:18px; padding:12px; border:2px solid ' + s.syncMessage.color + '; color:' + s.syncMessage.color + '; font-size:13px; text-align:center;">' + esc(s.syncMessage.text) + '</div>'
      : '';
    return '' +
      '<div style="font-size:13px; color:#9c96c2; margin-bottom:8px;">YOUR CODE &mdash; send this to sync your progress to the other phone</div>' +
      '<textarea id="syncCode" readonly style="width:100%; height:90px; background:#0d0b1e; border:2px solid #6f699c; color:#f4f1ff; font-family:monospace; font-size:11px; padding:10px; resize:none; margin-bottom:10px;">' + esc(encodeState(s)) + '</textarea>' +
      '<button onclick="App.copySyncCode()" style="width:100%; background:' + accent + '; color:#0d0b1e; border:3px solid #fff; box-shadow:4px 4px 0 #000; font-family:\'Press Start 2P\'; font-size:12px; padding:12px 0; cursor:pointer;">COPY CODE</button>' +
      '<div style="font-size:13px; color:#9c96c2; margin:26px 0 8px;">PASTE A CODE TO LOAD AN UPDATE</div>' +
      '<textarea id="syncInput" oninput="App.setSyncInput(this)" placeholder="Paste code here" style="width:100%; height:90px; background:#0d0b1e; border:2px solid #6f699c; color:#f4f1ff; font-family:monospace; font-size:11px; padding:10px; resize:none; margin-bottom:12px;">' + esc(s.syncInput) + '</textarea>' +
      '<button onclick="App.loadSyncUpdate()" style="width:100%; background:' + (isGm ? '#1c1a35' : '#1c1a35') + '; color:' + loadAccent + '; border:3px solid ' + loadAccent + '; box-shadow:4px 4px 0 #000; font-family:\'Press Start 2P\'; font-size:12px; padding:12px 0; cursor:pointer;">LOAD UPDATE</button>' +
      msgHtml;
  }

  function renderSync(v) {
    return '' +
      '<div data-screen-label="Sync" style="padding:22px 20px;">' +
        '<button onclick="App.goDashboard()" style="background:none; border:none; color:#9c96c2; font-family:\'Silkscreen\'; font-size:14px; cursor:pointer; padding:0; margin-bottom:18px;">&larr; BACK</button>' +
        '<div style="font-family:\'Press Start 2P\'; font-size:16px; color:' + v.pointsColor + '; margin-bottom:20px;">SYNC PROGRESS</div>' +
        renderSyncBody(v, false) +
      '</div>';
  }

  function renderPinGate(v) {
    var s = state;
    var padKeysHtml = v.padDef.map(function (k) {
      if (k === '') return '<button style="visibility:hidden;"></button>';
      if (k === 'DEL') return '<button onclick="App.pressBackspace()" style="background:#1c1a35; border:2px solid #6f699c; color:#f4f1ff; font-family:\'Silkscreen\'; font-size:16px; padding:16px 0; cursor:pointer;">&#9003;</button>';
      return '<button onclick="App.pressDigit(\'' + k + '\')" style="background:#1c1a35; border:2px solid #6f699c; color:#f4f1ff; font-family:\'Press Start 2P\'; font-size:14px; padding:16px 0; cursor:pointer;">' + k + '</button>';
    }).join('');

    var dotsHtml = v.pinDots.map(function (dot) {
      return '<div style="width:18px; height:18px; border:3px solid #b185f7; background:' + dot.filled + ';"></div>';
    }).join('');

    var errorHtml = s.pinError ? '<div style="color:#ff4d6d; font-size:12px; margin-bottom:16px;">WRONG PIN</div>' : '';

    return '' +
      '<div data-screen-label="GM Login" style="padding:60px 30px; text-align:center;">' +
        '<div style="font-family:\'Press Start 2P\'; font-size:15px; color:#b185f7; margin-bottom:8px;">GAME MASTER</div>' +
        '<div style="font-size:13px; color:#6f699c; margin-bottom:30px;">Enter PIN to continue</div>' +
        '<div style="display:flex; justify-content:center; gap:10px; margin-bottom:' + v.pinErrorMargin + ';">' + dotsHtml + '</div>' +
        errorHtml +
        '<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:260px; margin:0 auto;">' + padKeysHtml + '</div>' +
        '<button onclick="App.goDashboard()" style="margin-top:26px; background:none; border:none; color:#6f699c; font-size:13px; cursor:pointer;">&larr; back to dashboard</button>' +
      '</div>';
  }

  function renderGm(v) {
    var s = state;
    var body = '';

    if (s.gmTab === 'log') {
      body = '' +
        '<div style="background:#1c1a35; border:4px solid #b185f7; box-shadow:6px 6px 0 #000; padding:20px; margin-bottom:16px;">' +
          '<div style="font-size:13px; color:#9c96c2; margin-bottom:10px;">MILES RUN TODAY</div>' +
          '<input id="milesInput" value="' + esc(s.milesInput) + '" oninput="App.setMiles(this)" type="number" step="0.1" placeholder="e.g. 5.2" style="width:100%; background:#0d0b1e; border:2px solid #6f699c; color:#f4f1ff; font-family:\'Silkscreen\'; font-size:16px; padding:12px; margin-bottom:14px;"/>' +
          '<div style="font-size:13px; color:#9c96c2; margin-bottom:16px;">Current streak bonus: &times;' + v.multiplier + ' &mdash; will award <span style="color:#b185f7;">' + v.previewPoints + ' pts</span></div>' +
          '<button onclick="App.awardRun()" ' + (v.awardDisabled ? 'disabled' : '') + ' style="' + (v.awardDisabled
            ? "width:100%; background:#0d0b1e; color:#6f699c; border:2px solid #3a3660; font-family:'Press Start 2P'; font-size:12px; padding:14px 0; cursor:not-allowed;"
            : "width:100%; background:#b185f7; color:#0d0b1e; border:3px solid #fff; box-shadow:4px 4px 0 #000; font-family:'Press Start 2P'; font-size:12px; padding:14px 0; cursor:pointer;") + '">AWARD POINTS</button>' +
        '</div>' +
        '<div style="background:#1c1a35; border:2px solid #3a3660; padding:16px; display:flex; align-items:center; justify-content:space-between;">' +
          '<div style="font-size:13px; color:#9c96c2;">Streak: ' + s.streak + ' days</div>' +
          '<button onclick="App.resetStreak()" style="background:none; border:2px solid #ff4d6d; color:#ff4d6d; font-size:12px; padding:8px 12px; cursor:pointer;">RESET STREAK</button>' +
        '</div>';
    } else if (s.gmTab === 'shop') {
      var itemsHtml = v.shopItems.map(function (item) {
        return '' +
          '<div style="display:flex; align-items:center; justify-content:space-between; background:#1c1a35; border:2px solid #3a3660; padding:12px 14px; margin-bottom:8px;">' +
            '<div style="display:flex; align-items:center; gap:10px;">' +
              '<div style="width:28px; height:28px; background:' + item.colorHex + '; font-family:\'Press Start 2P\'; font-size:11px; color:#0d0b1e; display:flex; align-items:center; justify-content:center;">' + esc(item.letter) + '</div>' +
              '<div style="font-size:14px;">' + esc(item.name) + ' &mdash; ' + item.cost + 'pt</div>' +
            '</div>' +
            '<button onclick="App.removeItem(' + item.id + ')" style="background:none; border:none; color:#ff4d6d; font-size:18px; cursor:pointer;">&times;</button>' +
          '</div>';
      }).join('');

      var colorOptionsHtml = v.colorOptions.map(function (c) {
        return '<button onclick="App.setNewColor(\'' + c.name + '\')" style="' + c.style + '"></button>';
      }).join('');

      body = '' +
        '<div style="font-size:13px; color:#9c96c2; margin-bottom:10px;">CURRENT ITEMS</div>' +
        itemsHtml +
        '<div style="background:#1c1a35; border:4px solid #b185f7; box-shadow:6px 6px 0 #000; padding:18px; margin-top:16px;">' +
          '<div style="font-size:13px; color:#9c96c2; margin-bottom:10px;">ADD PRIZE</div>' +
          '<input id="newItemName" value="' + esc(s.newItemName) + '" oninput="App.setNewName(this)" placeholder="Prize name" style="width:100%; background:#0d0b1e; border:2px solid #6f699c; color:#f4f1ff; font-family:\'Silkscreen\'; font-size:15px; padding:10px; margin-bottom:10px;"/>' +
          '<input id="newItemCost" value="' + esc(s.newItemCost) + '" oninput="App.setNewCost(this)" type="number" placeholder="Cost in points" style="width:100%; background:#0d0b1e; border:2px solid #6f699c; color:#f4f1ff; font-family:\'Silkscreen\'; font-size:15px; padding:10px; margin-bottom:12px;"/>' +
          '<div style="display:flex; gap:8px; margin-bottom:14px;">' + colorOptionsHtml + '</div>' +
          '<button onclick="App.addItem()" ' + (v.addDisabled ? 'disabled' : '') + ' style="' + (v.addDisabled
            ? "width:100%; background:#0d0b1e; color:#6f699c; border:2px solid #3a3660; font-family:'Press Start 2P'; font-size:12px; padding:14px 0; cursor:not-allowed;"
            : "width:100%; background:#b185f7; color:#0d0b1e; border:3px solid #fff; box-shadow:4px 4px 0 #000; font-family:'Press Start 2P'; font-size:12px; padding:14px 0; cursor:pointer;") + '">ADD TO SHOP</button>' +
        '</div>';
    } else if (s.gmTab === 'req') {
      var pendingHtml = v.pendingRedemptions.map(function (r) {
        return '' +
          '<div style="background:#1c1a35; border:2px solid #ffcd3c; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between;">' +
            '<div>' +
              '<div style="font-size:14px;">' + esc(r.itemName) + '</div>' +
              '<div style="font-size:12px; color:#6f699c; margin-top:2px;">' + esc(r.date) + ' &mdash; ' + r.cost + 'pt</div>' +
            '</div>' +
            '<button onclick="App.fulfillRedemption(' + r.id + ')" style="background:#4ade80; color:#0d0b1e; border:none; font-size:12px; padding:8px 10px; cursor:pointer;">FULFILLED</button>' +
          '</div>';
      }).join('');

      var noPendingHtml = v.pendingRedemptions.length === 0
        ? '<div style="text-align:center; color:#6f699c; font-size:13px; padding:20px 0;">No pending redemptions.</div>'
        : '';

      var fulfilledHtml = '';
      if (v.fulfilledRedemptions.length > 0) {
        fulfilledHtml = '<div style="font-size:13px; color:#9c96c2; margin:20px 0 10px;">FULFILLED</div>' +
          v.fulfilledRedemptions.map(function (r) {
            return '' +
              '<div style="background:#1c1a35; border:2px solid #3a3660; padding:12px 14px; margin-bottom:8px; opacity:0.6;">' +
                '<div style="font-size:14px;">' + esc(r.itemName) + '</div>' +
                '<div style="font-size:12px; color:#6f699c; margin-top:2px;">' + esc(r.date) + ' &mdash; ' + r.cost + 'pt</div>' +
              '</div>';
          }).join('');
      }

      body = '<div style="font-size:13px; color:#9c96c2; margin-bottom:10px;">PENDING</div>' + pendingHtml + noPendingHtml + fulfilledHtml;
    } else if (s.gmTab === 'sync') {
      body = renderSyncBody(v, true);
    }

    var reqBadge = v.pendingRedemptions.length > 0 ? ' (' + v.pendingRedemptions.length + ')' : '';

    return '' +
      '<div data-screen-label="GM Admin">' +
        '<div style="display:flex; align-items:center; justify-content:space-between; padding:22px 20px 16px;">' +
          '<div style="font-family:\'Press Start 2P\'; font-size:14px; color:#b185f7;">GAME MASTER</div>' +
          '<button onclick="App.goDashboard()" style="background:none; border:none; color:#9c96c2; font-family:\'Silkscreen\'; font-size:14px; cursor:pointer;">EXIT &rarr;</button>' +
        '</div>' +
        '<div style="display:flex; padding:0 20px; gap:6px; margin-bottom:18px;">' +
          '<button onclick="App.tabLog()" style="' + tabStyle(s.gmTab === 'log') + '">LOG RUN</button>' +
          '<button onclick="App.tabShop()" style="' + tabStyle(s.gmTab === 'shop') + '">SHOP</button>' +
          '<button onclick="App.tabReq()" style="' + tabStyle(s.gmTab === 'req') + '">REQUESTS' + reqBadge + '</button>' +
          '<button onclick="App.tabSync()" style="' + tabStyle(s.gmTab === 'sync') + '">SYNC</button>' +
        '</div>' +
        '<div style="padding:0 20px;">' + body + '</div>' +
      '</div>';
  }

  function render() {
    var v = computeDerived();
    var html;
    if (state.screen === 'shop') html = renderShop(v);
    else if (state.screen === 'sync') html = renderSync(v);
    else if (state.screen === 'pin') html = renderPinGate(v);
    else if (state.screen === 'gm') html = renderGm(v);
    else html = renderDashboard(v);
    document.getElementById('app-content').innerHTML = html;
  }

  function scheduleRender() {
    var active = document.activeElement;
    var activeId = active && active.id ? active.id : null;
    var selStart = null, selEnd = null;
    if (activeId && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
      try { selStart = active.selectionStart; selEnd = active.selectionEnd; } catch (e) {}
    }
    render();
    if (activeId) {
      var el = document.getElementById(activeId);
      if (el && el !== document.getElementById('syncCode')) {
        el.focus();
        if (selStart !== null && el.setSelectionRange) {
          try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
        }
      }
    }
  }

  window.App = App;

  loadState();
  render();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
})();
</script>
</body>
</html>
